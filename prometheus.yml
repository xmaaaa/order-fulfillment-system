global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Spring Boot Actuator /actuator/prometheus
  # host.docker.internal → 宿主机（本地开发模式）
  - job_name: order-fulfillment
    static_configs:
      - targets: ['host.docker.internal:8888']
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
