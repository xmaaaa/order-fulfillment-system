# ══════════════════════════════════════════════════════════════════════════════
# Prometheus 配置 — 指标采集 & 告警规则加载
# ══════════════════════════════════════════════════════════════════════════════
#
# Prometheus 工作模式：主动拉取（Pull）
#   Prometheus 按 scrape_interval 定时访问目标的 /actuator/prometheus 端点
#   把返回的指标数据存入本地时序数据库（TSDB）
#
# 与 Push 模式（Jaeger、Filebeat）的区别：
#   Push：应用主动把数据发出去
#   Pull：Prometheus 主动来取，应用只需暴露端点等着被抓
# ══════════════════════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s      # 默认抓取间隔：每 15 秒拉一次所有 target 的指标
  evaluation_interval: 15s  # 告警规则评估间隔：每 15 秒检查一次 rule_files 里的规则是否触发

# ── 告警规则文件 ──────────────────────────────────────────────────────────────
# Prometheus 加载这些文件里的 alert 规则，按 evaluation_interval 周期评估
# 触发后状态变为 PENDING，持续超过 for 时长后变为 FIRING
# 在 http://localhost:9090/alerts 可以看到所有规则的当前状态
rule_files:
  - /etc/prometheus/rules/*.yml   # 对应 docker-compose 挂载的 prometheus-rules.yml

# ── 抓取目标配置 ──────────────────────────────────────────────────────────────
scrape_configs:
  - job_name: order-fulfillment           # job 名称，指标里会有 job="order-fulfillment" 标签
                                          # Grafana Dashboard 里的 PromQL 就是按这个标签过滤的
    static_configs:
      - targets: ['host.docker.internal:8888']   # 目标地址
                                                  # host.docker.internal = 宿主机 IP
                                                  # 让 Docker 容器内的 Prometheus 能访问本地的 Spring Boot
    metrics_path: /actuator/prometheus    # Spring Boot Actuator 暴露 Prometheus 格式指标的端点
    scrape_interval: 10s                  # 覆盖 global 的 15s，这个 job 每 10s 抓一次（更新更快）
