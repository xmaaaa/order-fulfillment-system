server:
  port: 8888

spring:
  application:
    #项目名称必填，在注册中心唯一
    #最好和之前域名规范、kubernetes service名等保持一致（会作为调用）
    name: xm-service
  datasource:
    url: jdbc:mysql://localhost:3306/xmtest?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8887   # Sentinel 控制台地址
        port: 8719                  # 客户端与控制台通信端口

redis:
  enabled: false
  address: "redis://localhost:6379"

management:
  health:
    db:
      enabled: false


twilio:
  account-sid: xxx
  auth-token: xxx
  api-key-sid: xxx
  api-key-secret: xxx
  phone-number: xxx

sendgrid:
  api-key: xxx
  from-email: test@test.com
  from-name: TeaTime Spa

